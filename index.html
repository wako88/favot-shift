<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Favot Shift</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header class="header">

        <div class="title">
            Favot Shift
        </div>

        <div class="toolbar">

            <input
                type="month"
                id="monthSelect"
            >

            <button id="createBtn">
                シフト作成
            </button>

            <button id="staffBtn">
                スタッフ管理
            </button>

            <button id="printBtn">
                印刷
            </button>

        </div>

    </header>

    <main>

        <section class="tableWrapper">

            <table id="shiftTable">

                <thead id="shiftHead">

                </thead>

                <tbody id="shiftBody">

                </tbody>

            </table>

        </section>

    </main>

    <!-- スタッフ管理 -->

    <dialog id="staffDialog">

        <div class="dialogHeader">

            <h2>スタッフ管理</h2>

        </div>

        <div id="staffList">

        </div>
                <div class="dialogButtons">

            <button id="addStaffBtn">
                ＋ スタッフ追加
            </button>

            <button id="closeStaffBtn">
                閉じる
            </button>

        </div>

    </dialog>

    <script src="table.js"></script>
    <script src="staff.js"></script>
    <script src="storage.js"></script>
    <script src="print.js"></script>
    <script src="app.js"></script>

</body>

</html>
